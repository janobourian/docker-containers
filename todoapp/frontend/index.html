<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }

    .todo-container {
      max-width: 600px;
      margin: 60px auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      padding: 30px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-text {
      flex-grow: 1;
      margin: 0 10px;
    }

    .todo-text.done {
      text-decoration: line-through;
      color: gray;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #6c63ff;
    }

    .btn-primary {
      background-color: #6c63ff;
      border: none;
    }
  </style>
</head>
<body>

  <div class="container todo-container">
    <h3 class="text-center mb-4">📝 My To-Do List</h3>

    <div class="input-group mb-3">
      <input type="text" id="todo-input" class="form-control" placeholder="Add new task..." />
      <button class="btn btn-primary" onclick="addTodo()">Add</button>
    </div>

    <ul class="list-group" id="todo-list"></ul>
  </div>

  <script>
    // Preloaded demo tasks (simulate API response from GET /api/todos)
    let todos = [
      { id: 1, text: 'Buy groceries', completed: false },
      { id: 2, text: 'Finish project report', completed: true },
      { id: 3, text: 'Call plumber', completed: false }
    ];

    function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();
      if (text === '') return;

      const todo = {
        id: Date.now(),
        text: text,
        completed: false
      };

      todos.push(todo);
      input.value = '';
      renderTodos();
    }

    function toggleTodo(id) {
      todos = todos.map(todo => 
        todo.id === id ? { ...todo, completed: !todo.completed } : todo
      );
      renderTodos();
    }

    function deleteTodo(id) {
      todos = todos.filter(todo => todo.id !== id);
      renderTodos();
    }

    function renderTodos() {
      const list = document.getElementById('todo-list');
      list.innerHTML = '';

      todos.forEach(todo => {
        const li = document.createElement('li');
        li.className = 'list-group-item todo-item';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.completed;
        checkbox.className = 'form-check-input me-2';
        checkbox.onclick = () => toggleTodo(todo.id);

        const span = document.createElement('span');
        span.className = 'todo-text' + (todo.completed ? ' done' : '');
        span.textContent = todo.text;

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'btn btn-sm btn-outline-danger';
        deleteBtn.innerHTML = '🗑️';
        deleteBtn.onclick = () => deleteTodo(todo.id);

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(deleteBtn);
        list.appendChild(li);
      });
    }

    // Render preloaded tasks on page load
    renderTodos();
  </script>

</body>
</html>
